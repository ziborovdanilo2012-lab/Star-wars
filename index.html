<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="js.js" defer></script>
</head>
<body>
    <header>
        <p class="heder_text">Star wars</p>
        <div class="input_button">
            <input type="text" placeholder="Наприклад: X-wing" class="input" list="suggestions">
            <button class="btnheder"><img src="free-icon-font-search.png" alt="" class="img"></button>
            <datalist id="suggestions"></datalist>
            
            <select id="filter-select">
                <option value="all">Усі кораблі</option>
                <option value="starfighter">Винищувачі (Starfighter)</option>
                <option value="capital">Крейсери (Capital ship)</option>
            </select>
        </div>
        <div class="btns">
            <button class="btn activ" id="btn1">Space shipі</button>
            <button class="btn" id="btn2">Characters</button>
        </div>
    </header>
    <main>
        <div id="idcart">
            <div id="photo-box"></div>
            <p>Description:</p>
            <span></span>
        </div>
        <div id="random-container"></div>
    </main>
</body>
</html>
